name: Desplegar en GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar sitio estático
        run: |
          mkdir _site
          cp index.html _site/
          mkdir -p _site/data
          cp data/products.json _site/data/
          touch _site/.nojekyll

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
