name: Desplegar en GitHub Pages

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["Actualizar catálogo"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Solo un despliegue simultáneo
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          # Sube toda la raíz del repo (index.html + data/ + images/)
          path: '.'

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
